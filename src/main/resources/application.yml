server:
  port: ${SERVER_PORT:3000}

spring:
  datasource:
    # 生产用 DB_URL / DB_USERNAME / DB_PASSWORD 覆盖（也兼容 Spring 原生的 SPRING_DATASOURCE_* 变量）
    url: ${DB_URL:jdbc:mysql://127.0.0.1:3306/digital_signage?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      # 阿里云 Redis 通常需要密码，通过 REDIS_PASSWORD 注入；本地默认无密码
      password: ${REDIS_PASSWORD:}

app:
  cors:
    # 允许跨域的前端来源，逗号分隔。生产必须设置为真实前端域名。
    allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://127.0.0.1:5173}
  aliyun:
    oss:
      endpoint: ${ALIYUN_OSS_ENDPOINT:https://oss-ap-southeast-1.aliyuncs.com}
      bucket: ${ALIYUN_OSS_BUCKET:digital-signage-media}
      region: ${ALIYUN_OSS_REGION:ap-southeast-1}
      access-key-id: ${ALIYUN_OSS_ACCESS_KEY_ID:}
      access-key-secret: ${ALIYUN_OSS_ACCESS_KEY_SECRET:}
  storage-public-base-url: ${STORAGE_PUBLIC_BASE_URL:https://media.digital-signage.ltd}
