name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  JAVA_VERSION: '17'
  REGISTRY: registry.cn-southeast-1.aliyuncs.com
  IMAGE_NAME: digital-signage/player-server

jobs:
  # -------- 1. Build & Test --------
  build-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven
      - name: Compile
        run: mvn compile -B
      - name: Unit Tests
        run: mvn test -B -Dtest='!*IntegrationTest,!*StressTest' -DfailIfNoTests=false
        env:
          SPRING_PROFILES_ACTIVE: test

  # -------- 2. Integration Test --------
  integration-test:
    name: Integration Tests
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testpass
          MYSQL_DATABASE: digital_signage
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven
      - name: Install MySQL client
        run: sudo apt-get install -y mysql-client
      - name: Init database schema
        run: |
          mysql -h 127.0.0.1 -u root -ptestpass digital_signage < sql/schema.sql
          mysql -h 127.0.0.1 -u root -ptestpass digital_signage < sql/mvp_seed.sql
      - name: Run integration & stress tests
        run: mvn verify -B -Dtest="*IntegrationTest,*StressTest" -DfailIfNoTests=false
        env:
          SPRING_DATASOURCE_URL: jdbc:mysql://127.0.0.1:3306/digital_signage?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
          SPRING_DATASOURCE_USERNAME: root
          SPRING_DATASOURCE_PASSWORD: testpass
          SPRING_DATA_REDIS_HOST: 127.0.0.1
          SPRING_DATA_REDIS_PORT: 6379

  # -------- 3. Docker Build --------
  docker-build:
    name: Docker Build
    needs: [build-test, integration-test]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build Docker image
        run: docker build -t ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} .

  # -------- 4. Push Image (main only) --------
  push-image:
    name: Push Image
    needs: [docker-build]
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - name: Login to Alibaba Cloud ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}
      - name: Build & push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest

  # -------- 5. API Smoke Test --------
  smoke-test:
    name: API Smoke Test
    needs: [build-test]
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testpass
          MYSQL_DATABASE: digital_signage
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven
      - name: Install MySQL client
        run: sudo apt-get install -y mysql-client
      - name: Init database
        run: |
          mysql -h 127.0.0.1 -u root -ptestpass digital_signage < sql/schema.sql
          mysql -h 127.0.0.1 -u root -ptestpass digital_signage < sql/mvp_seed.sql
      - name: Build & start server
        run: |
          mvn package -DskipTests -B
          java -jar target/*.jar &
        env:
          SPRING_DATASOURCE_URL: jdbc:mysql://127.0.0.1:3306/digital_signage?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
          SPRING_DATASOURCE_USERNAME: root
          SPRING_DATASOURCE_PASSWORD: testpass
          SPRING_DATA_REDIS_HOST: 127.0.0.1
          SPRING_DATA_REDIS_PORT: 6379
          SERVER_PORT: 3000
      - name: Wait for server ready
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:3000/health && exit 0
            sleep 2
          done
          exit 1
      - name: Smoke test - Register
        run: |
          curl -sf -X POST http://localhost:3000/api/v1/player/register \
            -H 'Content-Type: application/json' \
            -d '{"device_sn":"ci-smoke-001","activation_code":"TEST","device_name":"CI Smoke","platform":"web","app_version":"1.0.0","os_version":"CI","screen_resolution":"1920x1080","timezone":"UTC","mac_address":"00:00:00:00:00:01","ip_address":"127.0.0.1"}'
      - name: Smoke test - Health
        run: curl -sf http://localhost:3000/health
