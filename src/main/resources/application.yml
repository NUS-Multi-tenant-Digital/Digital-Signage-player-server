server:
  port: 3000

spring:
  datasource:
    url: jdbc:mysql://127.0.0.1:3306/digital_signage?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Shanghai
    username: root
    password: ${DB_PASSWORD:}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
  data:
    redis:
      host: 127.0.0.1
      port: 6379

app:
  aliyun:
    oss:
      endpoint: ${ALIYUN_OSS_ENDPOINT:https://oss-ap-southeast-1.aliyuncs.com}
      bucket: ${ALIYUN_OSS_BUCKET:digital-signage-media}
      region: ${ALIYUN_OSS_REGION:ap-southeast-1}
      access-key-id: ${ALIYUN_OSS_ACCESS_KEY_ID:}
      access-key-secret: ${ALIYUN_OSS_ACCESS_KEY_SECRET:}
  storage-public-base-url: ${STORAGE_PUBLIC_BASE_URL:https://media.digital-signage.ltd}
